[www]
user = www-data
group = www-data
listen = 0.0.0.0:9000

pm = dynamic
pm.max_children = 10
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500
pm.process_idle_timeout = 10s

request_terminate_timeout = 60s

; ログ（Cloud Logging 向け JSON）
access.log = /dev/stderr
access.format = '{"severity":"INFO","time":"%{%Y-%m-%dT%H:%M:%S%z}T","client":"%R","method":"%m","request_uri":"%r","status":"%s","duration":"%dms","memory":"%{mega}MMB"}'

catch_workers_output = yes
decorate_workers_output = no

; セキュリティ
php_admin_value[open_basedir] = /var/www/html:/tmp:/dev
