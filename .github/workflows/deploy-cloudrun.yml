name: Deploy to Cloud Run (dev)

on:
  push:
    branches:
      - main

env:
  GCP_REGION: asia-northeast1
  PROJECT_NAME: myapp
  ENV: dev
  NGINX_IMAGE: asia-northeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/myapp-dev-docker/nginx
  PHP_FPM_IMAGE: asia-northeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/myapp-dev-docker/php-fpm

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Workload Identity Federation に必要

    steps:
      # ========================================
      # 1. チェックアウト
      # ========================================
      - name: Checkout
        uses: actions/checkout@v4

      # ========================================
      # 2. GCP認証 (Workload Identity Federation)
      # ========================================
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      # ========================================
      # 3. gcloud CLI セットアップ
      # ========================================
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: 'latest'

      # ========================================
      # 4. Artifact Registry へ Docker 認証
      # ========================================
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # ========================================
      # 5. Docker イメージ ビルド (並列)
      # ========================================
      - name: Build Docker images
        run: |
          SHORT_SHA=${GITHUB_SHA::7}

          # Nginx と PHP-FPM を並列ビルド
          docker build \
            -t ${{ env.NGINX_IMAGE }}:${SHORT_SHA} \
            -t ${{ env.NGINX_IMAGE }}:latest \
            -f docker/nginx/Dockerfile \
            . &

          docker build \
            -t ${{ env.PHP_FPM_IMAGE }}:${SHORT_SHA} \
            -t ${{ env.PHP_FPM_IMAGE }}:latest \
            -f docker/php-fpm/Dockerfile \
            . &

          wait

      # ========================================
      # 6. Artifact Registry へ push
      # ========================================
      - name: Push Docker images
        run: |
          SHORT_SHA=${GITHUB_SHA::7}

          docker push ${{ env.NGINX_IMAGE }}:${SHORT_SHA} &
          docker push ${{ env.NGINX_IMAGE }}:latest &
          docker push ${{ env.PHP_FPM_IMAGE }}:${SHORT_SHA} &
          docker push ${{ env.PHP_FPM_IMAGE }}:latest &

          wait

      # ========================================
      # 7. Cloud Run デプロイ
      #    既存サービスの YAML をエクスポートし、
      #    イメージタグだけ差し替えて replace する
      #    ※ボリューム定義は除去（volume_type 必須エラー回避）
      #     ボリュームは Terraform 管理、replace では変更しない
      # ========================================
      - name: Deploy to Cloud Run
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          SERVICE_NAME="${{ env.PROJECT_NAME }}-${{ env.ENV }}-app"

          # サービスが存在するか確認（初回は Terraform で作成するため）
          if ! gcloud run services describe "${SERVICE_NAME}" \
            --region=${{ env.GCP_REGION }} \
            --format=export > service.yaml 2>/dev/null; then
            echo "::warning::Service ${SERVICE_NAME} does not exist yet. Skipping deploy (create it with Terraform first)."
            exit 0
          fi

          # イメージタグ更新 & ボリューム定義除去（Pythonで安全に操作）
          python3 -c "
          import yaml, sys
          with open('service.yaml') as f:
              svc = yaml.safe_load(f)
          spec = svc['spec']['template']['spec']
          # イメージタグ更新
          for c in spec.get('containers', []):
              img = c.get('image', '')
              if '/nginx:' in img or '/nginx@' in img:
                  c['image'] = '${{ env.NGINX_IMAGE }}:${SHORT_SHA}'
              elif '/php-fpm:' in img or '/php-fpm@' in img:
                  c['image'] = '${{ env.PHP_FPM_IMAGE }}:${SHORT_SHA}'
              # volumeMounts 除去
              c.pop('volumeMounts', None)
          # volumes 除去
          spec.pop('volumes', None)
          with open('service.yaml', 'w') as f:
              yaml.dump(svc, f, default_flow_style=False, allow_unicode=True)
          "

          echo "=== Updated service.yaml ==="
          cat service.yaml

          # サービスを更新
          gcloud run services replace service.yaml \
            --region=${{ env.GCP_REGION }}
